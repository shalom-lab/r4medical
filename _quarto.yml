# 项目基本配置
project:
  type: book            # 项目类型：书籍
  output-dir: docs      # 输出目录
  execute-dir: project  # 代码执行目录

# 书籍结构和元数据
book:
  title: "医学生R语言入门指南"  # 书名
  author: "shalom & AI"                    # 作者
  date: last-modified               # 最后修改日期
  language: zh                      # 语言：中文
  page-navigation: true
  reader-mode: true
  site-url: https://your-site.com
  repo-url: https://github.com/shalom-lab/r4medical
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - intro.qmd
    - part: "基础知识"
      chapters:
        - chapter1.qmd
        - chapter2.qmd
    - part: "数据处理与可视化"
      chapters:
        - chapter3.qmd
        - chapter4.qmd
        - chapter5.qmd
    - part: "统计分析"
      chapters:
        - chapter6.qmd
        - chapter7.qmd
    - part: "专业应用"
      chapters:
        - chapter8.qmd
        - chapter9.qmd
        - chapter10.qmd
  sidebar:
    style: docked
    background: light
    search: true
    tools:
      - icon: github
        href: https://github.com/your-username/your-repo
    contents:
      - section: ""  # 空标题的section用于公众号
        contents:
          - text: "👉 关注公众号【R语言与可视化】"
            style: "text-align: center; color: #1E88E5; padding: 10px 0;"
          - text: |
              ![R语言与可视化公众号](images/gzh-light.png){width=150px style="display: block; margin: 0 auto;"}
          - text: "扫码获取更多R语言资源"
            style: "text-align: center; font-size: 0.9em; color: #666; padding: 5px 0 15px 0;"

# 参考文献设置
# bibliography: references.bib        # 参考文献文件
# csl: chinese-medical-association.csl  # 引用样式

# 输出格式设置
format:
  # HTML输出设置
  html:
    theme: cosmo
    code-fold: show        # 默认展开但保留折叠功能
    code-tools: true       # 显示代码工具栏
    code-copy: true        # 显示复制按钮
    toc: true
    number-sections: true
    fig-width: 8
    fig-height: 6
    fig-dpi: 300
    df-print: paged

# 代码执行设置
execute:
  echo: true                     # 显示代码
  warning: false                 # 不显示警告
  message: false                 # 不显示消息
  cache: true                    # 启用缓存
  freeze: true                   # 冻结计算
  error: false                   # 出错时停止

# 编辑器设置
# editor: visual                   # 使用可视化编辑器

# knitr设置
knitr:
  opts_chunk:                    # 代码块选项
    collapse: true              # 合并输出
    comment: "#>"               # 输出注释符
    fig.align: "center"         # 图形居中
    out.width: "80%"            # 输出宽度
    dev: "ragg_png"             # 图形设备

# 资源文件
resources:                       # 项目资源
  - images/                     # 图片目录
  - data/                       # 数据目录
  - templates/                  # 模板目录
  - styles/                     # 样式目录

# 目录结构
directory-structure:             # 项目目录结构
  data: data                    # 数据目录
  scripts: R                    # R脚本目录
  output: output                # 输出目录
  figures: figures              # 图形目录
  tables: tables                # 表格目录
  reports: reports              # 报告目录 